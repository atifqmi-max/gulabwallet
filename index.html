<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulab Wallet | Register & Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c2c 0%, #2a4a35 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .header {
            background: #f4b942;
            padding: 24px;
            text-align: center;
            color: #1e3c2c;
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: 1px;
        }

        .header p {
            opacity: 0.9;
            margin-top: 6px;
        }

        .tabs {
            display: flex;
            background: #f0f0f0;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #555;
        }

        .tab-btn.active {
            background: white;
            color: #f4b942;
            border-bottom: 3px solid #f4b942;
        }

        .form-panel {
            padding: 32px 24px;
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            border: 1px solid #ddd;
            border-radius: 40px;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #f4b942;
            box-shadow: 0 0 0 3px rgba(244,185,66,0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #f4b942;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: #1e3c2c;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.2s;
        }

        button:hover {
            background: #e0a82e;
            transform: scale(0.98);
        }

        .message {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            padding: 8px;
            border-radius: 40px;
            background: #f8f9fa;
        }

        .error {
            color: #c0392b;
            background: #fce4e4;
        }

        .success {
            color: #2e7d32;
            background: #e0f2e0;
        }
        
        .info {
            color: #2980b9;
            background: #e3f2fd;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌸 Gulab Wallet</h1>
        <p>Your digital rose garden</p>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
    </div>

    <div id="login-panel" class="form-panel active">
        <form id="login-form">
            <input type="text" id="login-username" placeholder="Username" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login to Wallet</button>
            <div id="login-message" class="message"></div>
        </form>
    </div>

    <div id="register-panel" class="form-panel">
        <form id="register-form">
            <input type="text" id="reg-username" placeholder="Choose Username" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <button type="submit">Create Account</button>
            <div id="reg-message" class="message"></div>
        </form>
    </div>
</div>

<script>
    // Initialize database on first load
    function initializeDatabase() {
        // Check if users exist in localStorage
        let users = localStorage.getItem("gulab_users");
        
        if (!users) {
            // Create empty users array
            const emptyUsers = [];
            localStorage.setItem("gulab_users", JSON.stringify(emptyUsers));
            console.log("Database initialized with empty users array");
        }
        
        // Initialize redeem codes if not exists
        let redeemCodes = localStorage.getItem("gulab_redeem_codes");
        if (!redeemCodes) {
            localStorage.setItem("gulab_redeem_codes", JSON.stringify([]));
            console.log("Redeem codes database initialized");
        }
        
        // Check if there are any users and set first as admin if no admin exists
        const usersList = getUsers();
        const hasAdmin = usersList.some(u => u.isAdmin === true);
        
        if (usersList.length > 0 && !hasAdmin) {
            usersList[0].isAdmin = true;
            saveUsers(usersList);
            console.log("First user promoted to admin:", usersList[0].username);
        }
    }
    
    // Get all users from database
    function getUsers() {
        const users = localStorage.getItem("gulab_users");
        if (!users) {
            return [];
        }
        try {
            return JSON.parse(users);
        } catch (e) {
            console.error("Error parsing users:", e);
            return [];
        }
    }

    // Save users to database
    function saveUsers(users) {
        localStorage.setItem("gulab_users", JSON.stringify(users));
        console.log("Users saved successfully. Total users:", users.length);
    }

    // Helper: find user by username
    function findUser(username) {
        const users = getUsers();
        return users.find(u => u.username === username);
    }

    // Register logic
    document.getElementById("register-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const username = document.getElementById("reg-username").value.trim();
        const password = document.getElementById("reg-password").value.trim();
        const msgDiv = document.getElementById("reg-message");

        if (!username || !password) {
            msgDiv.innerText = "❌ All fields required";
            msgDiv.className = "message error";
            return;
        }
        
        if (username.length < 3) {
            msgDiv.innerText = "❌ Username must be at least 3 characters";
            msgDiv.className = "message error";
            return;
        }
        
        if (password.length < 4) {
            msgDiv.innerText = "❌ Password must be at least 4 characters";
            msgDiv.className = "message error";
            return;
        }

        let users = getUsers();
        
        // Check if username already exists
        if (users.find(u => u.username === username)) {
            msgDiv.innerText = "❌ Username already exists!";
            msgDiv.className = "message error";
            return;
        }

        // Create new user with initial balance 0
        const newUser = {
            id: Date.now(), // Unique ID
            username: username,
            password: password,
            balance: 0,
            transactions: [],
            walletAddress: "",
            isAdmin: false, // Default not admin
            createdAt: new Date().toISOString()
        };
        
        users.push(newUser);
        saveUsers(users);
        
        // If this is the first user, make them admin
        if (users.length === 1) {
            newUser.isAdmin = true;
            saveUsers(users);
            msgDiv.innerText = "✅ Account created! You are the ADMIN. You can now login.";
        } else {
            msgDiv.innerText = "✅ Account created successfully! You can now login.";
        }
        
        msgDiv.className = "message success";
        document.getElementById("reg-username").value = "";
        document.getElementById("reg-password").value = "";
        
        // Switch to login tab after 1.5 seconds
        setTimeout(() => {
            document.querySelector(".tab-btn[data-tab='login']").click();
            msgDiv.innerText = "";
        }, 1500);
    });

    // Login logic
    document.getElementById("login-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const username = document.getElementById("login-username").value.trim();
        const password = document.getElementById("login-password").value.trim();
        const msgDiv = document.getElementById("login-message");

        if (!username || !password) {
            msgDiv.innerText = "❌ Please enter username and password";
            msgDiv.className = "message error";
            return;
        }

        const users = getUsers();
        const user = users.find(u => u.username === username && u.password === password);
        
        if (!user) {
            msgDiv.innerText = "❌ Invalid credentials. Please check your username and password.";
            msgDiv.className = "message error";
            return;
        }

        // Store current logged in user in sessionStorage
        sessionStorage.setItem("gulab_logged_user", JSON.stringify({ 
            username: user.username, 
            isAdmin: user.isAdmin || false,
            id: user.id
        }));
        
        // Show success message
        msgDiv.innerText = "✅ Login successful! Redirecting...";
        msgDiv.className = "message success";
        
        // Redirect to hp.html
        setTimeout(() => {
            window.location.href = "hp.html";
        }, 1000);
    });

    // Tab switching
    const tabBtns = document.querySelectorAll(".tab-btn");
    const loginPanel = document.getElementById("login-panel");
    const regPanel = document.getElementById("register-panel");

    tabBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            const tabId = btn.getAttribute("data-tab");
            tabBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            if (tabId === "login") {
                loginPanel.classList.add("active");
                regPanel.classList.remove("active");
                // Clear messages
                document.getElementById("login-message").innerText = "";
            } else {
                regPanel.classList.add("active");
                loginPanel.classList.remove("active");
                document.getElementById("reg-message").innerText = "";
            }
        });
    });
    
    // Initialize database on page load
    initializeDatabase();
    
    // Display existing users count (for debugging - can be removed)
    const usersCount = getUsers().length;
    if (usersCount > 0) {
        console.log(`Database loaded with ${usersCount} existing user(s)`);
    }
</script>
</body>
</html>
